<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>링크트리 메이커</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F0EEF8;
  --card:#fff;
  --border:#E2DEF0;
  --text:#1A1A2E;
  --muted:#9A96B0;
  --accent:#6C63FF;
  --accent2:#8B85FF;
  --accent-bg:#F0EEFF;
  --sans:'Noto Sans KR',sans-serif;
  --serif:'Noto Serif KR',serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
.app{display:flex;min-height:100vh;}

/* LEFT */
.left{width:420px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.left-header{padding:24px 28px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:10;}
.left-logo{font-family:var(--serif);font-size:1.25rem;font-weight:600;color:var(--text);margin-bottom:3px;}
.left-logo span{color:var(--accent);}
.left-sub{font-size:0.68rem;color:var(--muted);}
.left-body{padding:22px 28px;display:flex;flex-direction:column;gap:24px;flex:1;}

.form-section-title{font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.form-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.field{margin-bottom:10px;}
.field label{display:block;font-size:0.68rem;color:var(--muted);letter-spacing:0.5px;margin-bottom:4px;}
.field input,.field textarea,.field select{width:100%;background:#F8F7FC;border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-family:var(--sans);font-size:0.82rem;color:var(--text);outline:none;transition:border-color 0.15s;}
.field input:focus,.field textarea:focus{border-color:var(--accent2);}
.field textarea{resize:vertical;min-height:58px;line-height:1.5;}

/* 사진 업로드 */
.photo-upload{border:1.5px dashed var(--border);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.photo-upload:hover{border-color:var(--accent2);background:var(--accent-bg);}
.photo-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.photo-preview{width:52px;height:52px;border-radius:50%;object-fit:cover;object-position:center top;margin:0 auto 6px;display:none;border:2px solid var(--accent);}
.photo-icon{font-size:1.6rem;margin-bottom:5px;}
.photo-text{font-size:0.68rem;color:var(--muted);}

/* 링크 아이템 */
.link-items{display:flex;flex-direction:column;gap:7px;}
.link-item-row{background:#F8F7FC;border:1px solid var(--border);border-radius:9px;padding:9px 10px;display:flex;gap:7px;align-items:center;}
.link-item-row select{width:42px;flex-shrink:0;padding:5px 3px;font-size:0.85rem;background:#fff;border:1px solid var(--border);border-radius:6px;outline:none;cursor:pointer;}
.link-item-row input{flex:1;background:#fff;padding:6px 9px;font-size:0.76rem;border:1px solid var(--border);border-radius:6px;outline:none;font-family:var(--sans);}
.link-remove{background:none;border:none;cursor:pointer;color:#CCC;font-size:0.9rem;padding:3px;transition:color 0.15s;flex-shrink:0;}
.link-remove:hover{color:#F44;}
.btn-add-link{display:flex;align-items:center;gap:6px;background:none;border:1.5px dashed var(--border);border-radius:9px;padding:8px 14px;font-family:var(--sans);font-size:0.75rem;color:var(--muted);cursor:pointer;width:100%;justify-content:center;transition:all 0.15s;margin-top:3px;}
.btn-add-link:hover{border-color:var(--accent2);color:var(--accent);}

/* 색상 */
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-opt{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all 0.15s;}
.color-opt.active{border-color:#333;transform:scale(1.15);}

/* 생성 버튼 */
.btn-generate{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-family:var(--sans);font-size:0.88rem;font-weight:700;cursor:pointer;width:100%;letter-spacing:0.5px;transition:all 0.15s;margin-top:4px;}
.btn-generate:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-download{background:#1A1A2E;color:#fff;border:none;border-radius:12px;padding:12px;font-family:var(--sans);font-size:0.82rem;font-weight:500;cursor:pointer;width:100%;letter-spacing:0.5px;transition:background 0.15s;display:none;margin-top:7px;}
.btn-download:hover{background:#2A2A4E;}

/* RIGHT */
.right{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;background:var(--bg);position:sticky;top:0;height:100vh;overflow:hidden;}

/* ── PHONE FRAME — 예시 이미지처럼 흰색+진한 둥근 테두리 ── */
.phone{
  width:265px;
  background:#fff;
  border-radius:46px;
  padding:10px;
  border:9px solid #1A1A2E;
  box-shadow:0 32px 80px rgba(26,26,46,0.22),0 8px 24px rgba(0,0,0,0.12);
  position:relative;
  transition:border-color 0.3s;
}
/* 노치 */
.phone-notch{
  background:#1A1A2E;
  height:28px;
  border-radius:20px 20px 0 0;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:0;
  margin:-10px -10px 0;
}
.notch-cut{
  background:#fff;
  width:130px;height:24px;
  border-radius:0 0 20px 20px;
}
/* 화면 */
.phone-screen{background:#F5F3FF;border-radius:4px;overflow:hidden;}

/* 상태바 */
.sbar{background:#F5F3FF;padding:5px 16px 3px;display:flex;align-items:center;justify-content:space-between;}
.sbar-time{font-size:0.6rem;font-weight:700;color:#1A1A2E;}
.sbar-icons{display:flex;gap:3px;align-items:center;}

/* 스크롤 */
.content{max-height:560px;overflow-y:auto;padding-bottom:16px;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none;}

/* 프로필 */
.pc-profile{padding:20px 0 14px;display:flex;flex-direction:column;align-items:center;background:#F5F3FF;}
.pc-avatar{width:72px;height:72px;border-radius:50%;border:3px solid #fff;box-shadow:0 4px 16px rgba(108,99,255,0.2);margin-bottom:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6C63FF,#A78BFF);font-family:var(--serif);font-size:1.5rem;font-weight:600;color:#fff;transition:background 0.3s;}
.pc-avatar img{width:100%;height:100%;object-fit:cover;object-position:center top;display:none;}
.pc-name{font-size:1rem;font-weight:700;color:#1A1A2E;margin-bottom:4px;letter-spacing:-0.3px;}
.pc-bio{font-size:0.68rem;color:#666;line-height:1.55;text-align:center;padding:0 18px;font-weight:300;}

/* 통계 */
.pc-stats{display:flex;justify-content:center;gap:28px;padding:14px 0 12px;background:#F5F3FF;}
.pc-stat{text-align:center;}
.pc-stat-n{font-size:1rem;font-weight:700;color:#1A1A2E;line-height:1;}
.pc-stat-l{font-size:0.5rem;letter-spacing:1.5px;text-transform:uppercase;color:#AAA;margin-top:2px;}

/* 구분 */
.pc-div{height:8px;background:#ECEAFA;}

/* 소셜 아이콘 */
.pc-icons{display:flex;justify-content:center;gap:12px;padding:14px 12px 10px;background:#F5F3FF;}
.pc-ic{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;cursor:pointer;}
.pc-ic-circle{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.pc-ic-circle svg{width:20px;height:20px;}
.pc-ic-circle img{width:20px;height:20px;object-fit:contain;}
.pc-ic-label{font-size:0.5rem;color:#AAA;white-space:nowrap;}

/* 링크 카드 */
.pc-cards{padding:8px 10px 0;display:flex;flex-direction:column;gap:5px;background:#F5F3FF;}
.pc-card{display:flex;align-items:center;gap:8px;border-radius:12px;padding:10px 12px;text-decoration:none;color:#1A1A2E;box-shadow:0 1px 6px rgba(108,99,255,0.1);transition:transform 0.12s;background:#fff;}
.pc-card.feat{background:linear-gradient(135deg,#6C63FF,#A78BFF);}
.pc-card.feat .pc-card-title{color:#fff;}
.pc-card.feat .pc-card-desc{color:rgba(255,255,255,0.6);}
.pc-card.feat .pc-card-arr{color:rgba(255,255,255,0.4);}
.pc-card.feat .pc-card-ico{background:rgba(255,255,255,0.15);}
.pc-card-ico{width:28px;height:28px;border-radius:8px;background:#F0EEFF;display:flex;align-items:center;justify-content:center;font-size:0.75rem;flex-shrink:0;}
.pc-card-body{flex:1;min-width:0;}
.pc-card-title{font-size:0.7rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-card-desc{font-size:0.55rem;color:#AAA;margin-top:1px;}
.pc-card-arr{font-size:0.6rem;color:#DDD;flex-shrink:0;}

@media(max-width:900px){.app{flex-direction:column;}.left{width:100%;}.right{position:static;height:auto;padding:32px 20px 48px;}}
</style>
</head>
<body>
<div class="app">

<!-- LEFT -->
<div class="left">
  <div class="left-header">
    <div class="left-logo">링크<span>트리</span> 메이커</div>
    <div class="left-sub">정보 입력 → 실시간 미리보기 → HTML 다운로드 → Netlify 배포</div>
  </div>
  <div class="left-body">

    <!-- 프로필 -->
    <div>
      <div class="form-section-title">프로필</div>
      <div class="field" style="margin-bottom:14px;">
        <label>프로필 사진</label>
        <div class="photo-upload" id="photoUpload">
          <input type="file" id="photoInput" accept="image/*">
          <img class="photo-preview" id="photoPreview">
          <div class="photo-icon" id="photoIcon">📷</div>
          <div class="photo-text" id="photoText">클릭하여 사진 업로드</div>
        </div>
      </div>
      <div class="field"><label>이름 / 닉네임</label><input type="text" id="inp-name" placeholder="예: @Zia_official"></div>
      <div class="field"><label>소개</label><textarea id="inp-bio" placeholder="예: Digital Creator & Visual Artist&#10;Inspiring your daily lifestyle."></textarea></div>
    </div>

    <!-- 통계 -->
    <div>
      <div class="form-section-title">통계 숫자 (선택)</div>
      <div style="display:flex;gap:8px;">
        <div class="field" style="flex:1;margin-bottom:0;"><label>숫자1</label><input type="text" id="stat1-n" placeholder="0"></div>
        <div class="field" style="flex:1;margin-bottom:0;"><label>라벨1</label><input type="text" id="stat1-l" placeholder="LINKS"></div>
        <div class="field" style="flex:1;margin-bottom:0;"><label>숫자2</label><input type="text" id="stat2-n" placeholder="1.2K"></div>
        <div class="field" style="flex:1;margin-bottom:0;"><label>라벨2</label><input type="text" id="stat2-l" placeholder="FOLLOWERS"></div>
      </div>
    </div>

    <!-- SNS -->
    <div>
      <div class="form-section-title">SNS 아이콘</div>
      <div class="field"><label>Instagram URL</label><input type="text" id="sns-insta" placeholder="https://instagram.com/..."></div>
      <div class="field"><label>카카오톡 채널 URL</label><input type="text" id="sns-kakao" placeholder="https://pf.kakao.com/..."></div>
      <div class="field"><label>YouTube URL</label><input type="text" id="sns-youtube" placeholder="https://youtube.com/..."></div>
      <div class="field"><label>블로그 URL (네이버/브런치)</label><input type="text" id="sns-blog" placeholder="https://blog.naver.com/..."></div>
      <div class="field"><label>이메일</label><input type="text" id="sns-email" placeholder="example@email.com"></div>
    </div>

    <!-- 링크 카드 -->
    <div>
      <div class="form-section-title">링크 카드</div>
      <div style="font-size:0.68rem;color:var(--muted);margin-bottom:10px;">첫 번째 카드는 보라색 강조로 표시됩니다.</div>
      <div class="link-items" id="linkItems"></div>
      <button class="btn-add-link" id="btnAddLink">+ 링크 추가</button>
    </div>

    <!-- 테마 색상 -->
    <div>
      <div class="form-section-title">테마 색상</div>
      <div class="field"><label>배경 & 강조색</label>
        <div class="color-row" id="themeRow">
          <div class="color-opt active" data-theme="F5F3FF,6C63FF,A78BFF,1A1A2E" style="background:linear-gradient(135deg,#6C63FF,#A78BFF)" title="라벤더 (기본)"></div>
          <div class="color-opt" data-theme="F0F8F2,2C6E49,4A9066,1A2E1E" style="background:linear-gradient(135deg,#2C6E49,#4A9066)" title="포레스트 그린"></div>
          <div class="color-opt" data-theme="FFF8F0,E8822A,F0A84A,2E1E0A" style="background:linear-gradient(135deg,#E8822A,#F0A84A)" title="오렌지"></div>
          <div class="color-opt" data-theme="F0F4FF,1A5CBE,3A7DE0,0A1A3E" style="background:linear-gradient(135deg,#1A5CBE,#3A7DE0)" title="블루"></div>
          <div class="color-opt" data-theme="FFF0F5,C0395A,E05A7A,2E0A14" style="background:linear-gradient(135deg,#C0395A,#E05A7A)" title="로즈"></div>
          <div class="color-opt" data-theme="F0F0F0,2A2A2A,444,0A0A0A" style="background:linear-gradient(135deg,#2A2A2A,#555)" title="블랙"></div>
        </div>
      </div>
    </div>

    <div>
      <button class="btn-generate" id="btnGenerate">✦ HTML 파일 생성 & 다운로드</button>
      <button class="btn-download" id="btnDownload">⬇ 다시 다운로드</button>
    </div>

  </div>
</div>

<!-- RIGHT: 미리보기 -->
<div class="right">
  <div class="phone" id="phoneFrame">
    <!-- 노치 -->
    <div class="phone-notch"><div class="notch-cut"></div></div>

    <div class="phone-screen" id="phoneScreen">
      <div class="sbar" id="phoneSbar">
        <span class="sbar-time">9:41</span>
        <div class="sbar-icons">
          <svg width="12" height="8" viewBox="0 0 12 8" fill="#1A1A2E"><rect x="0" y="2" width="2" height="6" rx=".5"/><rect x="3" y="1" width="2" height="7" rx=".5"/><rect x="6" y="0" width="2" height="8" rx=".5"/><rect x="9" y="0" width="2" height="8" rx=".5" opacity=".25"/></svg>
          <svg width="12" height="8" viewBox="0 0 12 8" fill="#1A1A2E"><path d="M6 1.5C8.3 1.5 10.3 2.4 11.7 3.9l.8-.8C10.9 1.3 8.6 0 6 0S1.1 1.3-.5 3.1l.8.8C1.7 2.4 3.7 1.5 6 1.5z" opacity=".25"/><path d="M6 3.5c1.5 0 2.8.6 3.8 1.5l.8-.8C9.3 3 7.8 2.5 6 2.5S2.7 3 1.4 4.2l.8.8C3.2 4.1 4.5 3.5 6 3.5z" opacity=".6"/><path d="M6 5.5c.9 0 1.6.3 2.2.8L9 5.5C8.1 4.8 7.1 4.5 6 4.5S3.9 4.8 3 5.5l.8.8C4.4 5.8 5.1 5.5 6 5.5z"/><circle cx="6" cy="7.5" r="1"/></svg>
          <svg width="20" height="8" viewBox="0 0 20 8" fill="none"><rect x=".5" y=".5" width="15" height="7" rx="1.5" stroke="#1A1A2E" stroke-width="1"/><rect x="1.5" y="1.5" width="11" height="5" rx="1" fill="#1A1A2E"/><rect x="16.5" y="2.5" width="2" height="3" rx=".5" fill="#1A1A2E" opacity=".4"/></svg>
        </div>
      </div>

      <div class="content" id="phoneContent">
        <div class="pc-profile" id="pcProfile">
          <div class="pc-avatar" id="pcAvatar"><span id="pcAvatarText">?</span><img id="pcAvatarImg"></div>
          <div class="pc-name" id="pcName">@닉네임</div>
          <div class="pc-bio" id="pcBio">소개를 입력하세요</div>
        </div>
        <div class="pc-stats" id="pcStats">
          <div class="pc-stat"><div class="pc-stat-n" id="stat1n">0</div><div class="pc-stat-l" id="stat1l">LINKS</div></div>
          <div class="pc-stat"><div class="pc-stat-n" id="stat2n">1.2K</div><div class="pc-stat-l" id="stat2l">FOLLOWERS</div></div>
        </div>
        <div class="pc-div"></div>
        <div class="pc-icons" id="pcIcons"></div>
        <div class="pc-cards" id="pcCards"></div>
      </div>
    </div>
  </div>
</div>

</div>

<script>
// ── SVG EMBLEMS (공식 스타일) ──
const EMBLEMS = {
  insta: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="ig" cx="30%" cy="107%" r="150%"><stop offset="0%" stop-color="#fdf497"/><stop offset="5%" stop-color="#fdf497"/><stop offset="45%" stop-color="#fd5949"/><stop offset="60%" stop-color="#d6249f"/><stop offset="90%" stop-color="#285AEB"/></radialGradient></defs>
    <rect width="24" height="24" rx="6" fill="url(#ig)"/>
    <path d="M12 7.4A4.6 4.6 0 107.4 12 4.61 4.61 0 0012 7.4zm0 7.6A3 3 0 119 12a3 3 0 013 3zm4.8-7.8a1.08 1.08 0 11-1.08-1.08A1.08 1.08 0 0116.8 7.2z" fill="white"/>
    <path d="M16.5 3h-9A4.5 4.5 0 003 7.5v9A4.5 4.5 0 007.5 21h9A4.5 4.5 0 0021 16.5v-9A4.5 4.5 0 0016.5 3zm3 13.5A3 3 0 0116.5 19.5h-9A3 3 0 014.5 16.5v-9A3 3 0 017.5 4.5h9A3 3 0 0119.5 7.5z" fill="white" opacity="0"/>
  </svg>`,

  kakao: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <rect width="24" height="24" rx="5" fill="#FEE500"/>
    <path d="M12 5C7.03 5 3 8.13 3 12.01c0 2.53 1.64 4.75 4.1 6.03l-.9 3.33a.3.3 0 00.45.33L10.7 19.4c.42.06.85.1 1.3.1 4.97 0 9-3.13 9-7.01S16.97 5 12 5z" fill="#3A1D00"/>
  </svg>`,

  youtube: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <rect width="24" height="24" rx="5" fill="#FF0000"/>
    <path d="M21.6 8.2a2.7 2.7 0 00-1.9-1.9C18 6 12 6 12 6s-6 0-7.7.3A2.7 2.7 0 002.4 8.2 28 28 0 002 12a28 28 0 00.4 3.8 2.7 2.7 0 001.9 1.9C6 18 12 18 12 18s6 0 7.7-.3a2.7 2.7 0 001.9-1.9A28 28 0 0022 12a28 28 0 00-.4-3.8z" fill="white"/>
    <path d="M10 15l5-3-5-3v6z" fill="#FF0000"/>
  </svg>`,

  naver_blog: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <rect width="24" height="24" rx="5" fill="#03C75A"/>
    <path d="M13.54 12.26L10.3 7H7v10h3.46l3.24-5.26V17H17V7h-3.46z" fill="white"/>
  </svg>`,

  email: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <rect width="24" height="24" rx="5" fill="#EA4335"/>
    <path d="M20 8l-8 5-8-5V7a1 1 0 011-1h14a1 1 0 011 1v1z" fill="white"/>
    <path d="M4 9.5l8 5 8-5V17a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z" fill="white"/>
  </svg>`,
};

const LINK_ICONS = ['🚀','🌱','🧭','📅','✍️','📮','🎓','💬','🛒','🔗','⭐','💡'];

let photoData = null;
let themeCurrent = {bg:'F5F3FF',ac1:'6C63FF',ac2:'A78BFF',dark:'1A1A2E'};

// 테마 파싱
function parseTheme(str) {
  const [bg,ac1,ac2,dark] = str.split(',');
  return {bg:`#${bg}`,ac1:`#${ac1}`,ac2:`#${ac2}`,dark:`#${dark}`};
}

// ── LINK ITEMS ──
function addLinkItem(icon='🚀',title='',desc='',url='') {
  const row = document.createElement('div');
  row.className = 'link-item-row';
  const iconOpts = LINK_ICONS.map(i=>`<option ${i===icon?'selected':''}>${i}</option>`).join('');
  row.innerHTML = `
    <select class="li-icon">${iconOpts}</select>
    <input type="text" placeholder="제목" value="${title}" class="li-title">
    <input type="text" placeholder="설명" value="${desc}" class="li-desc">
    <input type="text" placeholder="URL" value="${url}" class="li-url">
    <button class="link-remove">✕</button>`;
  row.querySelector('.link-remove').onclick=()=>{row.remove();render();};
  row.querySelectorAll('input,select').forEach(el=>el.addEventListener('input',render));
  document.getElementById('linkItems').appendChild(row);
  render();
}

document.getElementById('btnAddLink').onclick=()=>addLinkItem();

// ── PHOTO ──
document.getElementById('photoInput').addEventListener('change',function(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    photoData=ev.target.result;
    const p=document.getElementById('photoPreview');
    p.src=photoData; p.style.display='block';
    document.getElementById('photoIcon').style.display='none';
    document.getElementById('photoText').textContent='사진 변경';
    render();
  };
  reader.readAsDataURL(file);
});

// ── THEME ──
document.querySelectorAll('#themeRow .color-opt').forEach(el=>{
  el.addEventListener('click',function(){
    document.querySelectorAll('#themeRow .color-opt').forEach(e=>e.classList.remove('active'));
    this.classList.add('active');
    themeCurrent=parseTheme(this.dataset.theme);
    render();
  });
});

// ── INPUT LISTENERS ──
['inp-name','inp-bio','sns-insta','sns-kakao','sns-youtube','sns-blog','sns-email',
 'stat1-n','stat1-l','stat2-n','stat2-l'].forEach(id=>{

});

// ── RENDER ──
function render(){
  const name   = document.getElementById('inp-name').value||'@닉네임';
  const bio    = document.getElementById('inp-bio').value||'소개를 입력하세요';
  const insta  = document.getElementById('sns-insta').value;
  const kakao  = document.getElementById('sns-kakao').value;
  const yt     = document.getElementById('sns-youtube').value;
  const blog   = document.getElementById('sns-blog').value;
  const email  = document.getElementById('sns-email').value;
  const s1n    = document.getElementById('stat1-n').value||'0';
  const s1l    = document.getElementById('stat1-l').value||'LINKS';
  const s2n    = document.getElementById('stat2-n').value||'1.2K';
  const s2l    = document.getElementById('stat2-l').value||'FOLLOWERS';
  const t      = themeCurrent;

  // 폰 배경색
  document.getElementById('phoneScreen').style.background=t.bg;
  document.getElementById('phoneSbar').style.background=t.bg;
  document.getElementById('pcProfile').style.background=t.bg;
  document.getElementById('pcStats').style.background=t.bg;
  document.getElementById('pcIcons').style.background=t.bg;
  document.getElementById('pcCards').style.background=t.bg;
  document.getElementById('pcName').style.color=t.dark;

  // 폰 프레임 테두리
  document.getElementById('phoneFrame').style.borderColor=t.dark;
  document.querySelector('.phone-notch').style.background=t.dark;

  // 아바타
  const av=document.getElementById('pcAvatar');
  av.style.background=`linear-gradient(135deg,${t.ac1},${t.ac2})`;
  const avImg=document.getElementById('pcAvatarImg');
  const avTxt=document.getElementById('pcAvatarText');
  if(photoData){avImg.src=photoData;avImg.style.display='block';avTxt.style.display='none';}
  else{avImg.style.display='none';avTxt.style.display='block';avTxt.textContent=name.replace('@','').charAt(0)||'?';}

  document.getElementById('pcName').textContent=name;
  document.getElementById('pcBio').textContent=bio;
  document.getElementById('stat1n').textContent=s1n;
  document.getElementById('stat1l').textContent=s1l;
  document.getElementById('stat2n').textContent=s2n;
  document.getElementById('stat2l').textContent=s2l;
  document.getElementById('stat1n').style.color=t.dark;
  document.getElementById('stat2n').style.color=t.dark;

  // SNS 아이콘
  const sns=[
    {val:insta,svg:EMBLEMS.insta,label:'Instagram',href:insta},
    {val:kakao,svg:EMBLEMS.kakao,label:'카카오',href:kakao},
    {val:yt,svg:EMBLEMS.youtube,label:'YouTube',href:yt},
    {val:blog,svg:EMBLEMS.naver_blog,label:'Blog',href:blog},
    {val:email,svg:EMBLEMS.email,label:'Email',href:`mailto:${email}`},
  ].filter(s=>s.val);

  const icEl=document.getElementById('pcIcons');
  icEl.innerHTML='';
  if(sns.length){
    sns.forEach(s=>{
      icEl.innerHTML+=`<a class="pc-ic" href="${s.href}" target="_blank">
        <div class="pc-ic-circle" style="background:transparent;">${s.svg}</div>
        <span class="pc-ic-label">${s.label}</span>
      </a>`;
    });
    icEl.style.display='flex';
  } else { icEl.style.display='none'; }

  // 링크 카드
  const cardsEl=document.getElementById('pcCards');
  cardsEl.innerHTML='';
  document.querySelectorAll('.link-item-row').forEach((row,i)=>{
    const icon =row.querySelector('.li-icon').value;
    const title=row.querySelector('.li-title').value||'제목';
    const desc =row.querySelector('.li-desc').value;
    const url  =row.querySelector('.li-url').value||'#';
    const feat =i===0;
    const cStyle=feat?`background:linear-gradient(135deg,${t.ac1},${t.ac2});`:'background:#fff;';
    const tColor=feat?'color:#fff;':'';
    const dColor=feat?'color:rgba(255,255,255,0.6);':'';
    const iStyle=feat?'background:rgba(255,255,255,0.15);':'background:#F0EEFF;';
    cardsEl.innerHTML+=`<a class="pc-card" href="${url}" target="_blank" style="${cStyle}">
      <div class="pc-card-ico" style="${iStyle}">${icon}</div>
      <div class="pc-card-body">
        <div class="pc-card-title" style="${tColor}">${title}</div>
        ${desc?`<div class="pc-card-desc" style="${dColor}">${desc}</div>`:''}
      </div>
      <div class="pc-card-arr" style="${feat?'color:rgba(255,255,255,0.4);':''}">↗</div>
    </a>`;
  });
}

// ── GENERATE ──
function buildHTML(){
  const name   = document.getElementById('inp-name').value||'이름';
  const bio    = document.getElementById('inp-bio').value||'';
  const insta  = document.getElementById('sns-insta').value;
  const kakao  = document.getElementById('sns-kakao').value;
  const yt     = document.getElementById('sns-youtube').value;
  const blog   = document.getElementById('sns-blog').value;
  const email  = document.getElementById('sns-email').value;
  const s1n    = document.getElementById('stat1-n').value||'0';
  const s1l    = document.getElementById('stat1-l').value||'LINKS';
  const s2n    = document.getElementById('stat2-n').value||'1.2K';
  const s2l    = document.getElementById('stat2-l').value||'FOLLOWERS';
  const t      = themeCurrent;
  const photo  = photoData||'';

  const sns=[
    {val:insta,svg:EMBLEMS.insta,label:'Instagram',href:insta},
    {val:kakao,svg:EMBLEMS.kakao,label:'카카오',href:kakao},
    {val:yt,svg:EMBLEMS.youtube,label:'YouTube',href:yt},
    {val:blog,svg:EMBLEMS.naver_blog,label:'Blog',href:blog},
    {val:email,svg:EMBLEMS.email,label:'Email',href:`mailto:${email}`},
  ].filter(s=>s.val);

  const iconsHTML=sns.map(s=>`<a class="ic" href="${s.href}" target="_blank">
    <div class="ic-c">${s.svg}</div><span class="ic-l">${s.label}</span>
  </a>`).join('');

  const avatarHTML=photo
    ?`<img src="${photo}" style="width:100%;height:100%;object-fit:cover;object-position:center top;">`
    :`<span style="font-size:1.5rem;font-weight:600;color:#fff;">${name.replace('@','').charAt(0)||'?'}</span>`;

  const cardsHTML=Array.from(document.querySelectorAll('.link-item-row')).map((row,i)=>{
    const icon =row.querySelector('.li-icon').value;
    const title=row.querySelector('.li-title').value||'제목';
    const desc =row.querySelector('.li-desc').value;
    const url  =row.querySelector('.li-url').value||'#';
    const feat =i===0;
    const cStyle=feat?`background:linear-gradient(135deg,${t.ac1},${t.ac2});`:'background:#fff;';
    const tColor=feat?'color:#fff;':'';
    const dColor=feat?'color:rgba(255,255,255,0.6);':'';
    const iStyle=feat?'background:rgba(255,255,255,0.15);':`background:${t.bg};`;
    return `<a class="card" href="${url}" target="_blank" style="${cStyle}">
      <div class="cico" style="${iStyle}">${icon}</div>
      <div class="cbody"><div class="ctitle" style="${tColor}">${title}</div>${desc?`<div class="cdesc" style="${dColor}">${desc}</div>`:''}</div>
      <div class="carr" style="${feat?'color:rgba(255,255,255,0.4);':''}">↗</div>
    </a>`;
  }).join('');

  return `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>${name}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#ECEAF4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px 56px;font-family:'Noto Sans KR',sans-serif;}
.phone{width:265px;background:#fff;border-radius:46px;padding:10px;border:9px solid ${t.dark};box-shadow:0 32px 80px rgba(0,0,0,0.2),0 8px 24px rgba(0,0,0,0.1);position:relative;animation:rise .6s cubic-bezier(.16,1,.3,1) both;}
.notch-bar{background:${t.dark};height:28px;border-radius:20px 20px 0 0;display:flex;align-items:flex-end;justify-content:center;margin:-10px -10px 0;}
.notch-cut{background:#fff;width:130px;height:24px;border-radius:0 0 20px 20px;}
.screen{background:${t.bg};border-radius:4px;overflow:hidden;}
.sbar{background:${t.bg};padding:5px 16px 3px;display:flex;align-items:center;justify-content:space-between;}
.sbar-t{font-size:.6rem;font-weight:700;color:${t.dark};}
.sbar-i{display:flex;gap:3px;align-items:center;}
.content{max-height:580px;overflow-y:auto;padding-bottom:16px;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none;}
.profile{padding:20px 0 14px;display:flex;flex-direction:column;align-items:center;background:${t.bg};}
.avatar{width:72px;height:72px;border-radius:50%;border:3px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,.15);margin-bottom:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,${t.ac1},${t.ac2});}
.pname{font-size:1rem;font-weight:700;color:${t.dark};margin-bottom:4px;}
.pbio{font-size:.68rem;color:#666;line-height:1.55;text-align:center;padding:0 18px;font-weight:300;}
.stats{display:flex;justify-content:center;gap:28px;padding:14px 0 12px;background:${t.bg};}
.stat{text-align:center;}
.stat-n{font-size:1rem;font-weight:700;color:${t.dark};}
.stat-l{font-size:.5rem;letter-spacing:1.5px;text-transform:uppercase;color:#AAA;margin-top:2px;}
.div{height:8px;background:${t.bg}; filter:brightness(0.94);}
.icons{display:flex;justify-content:center;gap:12px;padding:14px 12px 10px;background:${t.bg};}
.ic{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;}
.ic-c{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.ic-c svg{width:40px;height:40px;}
.ic-l{font-size:.5rem;color:#AAA;white-space:nowrap;}
.cards{padding:8px 10px 0;display:flex;flex-direction:column;gap:5px;background:${t.bg};}
.card{display:flex;align-items:center;gap:8px;border-radius:12px;padding:10px 12px;text-decoration:none;color:${t.dark};box-shadow:0 1px 6px rgba(0,0,0,.08);}
.cico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;}
.cbody{flex:1;min-width:0;}
.ctitle{font-size:.7rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cdesc{font-size:.55rem;color:#AAA;margin-top:1px;}
.carr{font-size:.6rem;color:#DDD;flex-shrink:0;}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="phone">
<div class="notch-bar"><div class="notch-cut"></div></div>
<div class="screen">
<div class="sbar">
<span class="sbar-t">9:41</span>
<div class="sbar-i">
<svg width="12" height="8" viewBox="0 0 12 8" fill="${t.dark}"><rect x="0" y="2" width="2" height="6" rx=".5"/><rect x="3" y="1" width="2" height="7" rx=".5"/><rect x="6" y="0" width="2" height="8" rx=".5"/><rect x="9" y="0" width="2" height="8" rx=".5" opacity=".25"/></svg>
<svg width="20" height="8" viewBox="0 0 20 8" fill="none"><rect x=".5" y=".5" width="15" height="7" rx="1.5" stroke="${t.dark}" stroke-width="1"/><rect x="1.5" y="1.5" width="11" height="5" rx="1" fill="${t.dark}"/><rect x="16.5" y="2.5" width="2" height="3" rx=".5" fill="${t.dark}" opacity=".4"/></svg>
</div>
</div>
<div class="content">
<div class="profile"><div class="avatar">${avatarHTML}</div><div class="pname">${name}</div><div class="pbio">${bio}</div></div>
<div class="stats"><div class="stat"><div class="stat-n">${s1n}</div><div class="stat-l">${s1l}</div></div><div class="stat"><div class="stat-n">${s2n}</div><div class="stat-l">${s2l}</div></div></div>
<div class="div"></div>
${iconsHTML?`<div class="icons">${iconsHTML}</div>`:''}
<div class="cards">${cardsHTML}</div>
</div>
</div>
</div>
</body>
</html>`;
}

document.getElementById('btnGenerate').addEventListener('click',()=>{
  const html=buildHTML();
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`linktree.html`;
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('btnDownload').style.display='block';
});
document.getElementById('btnDownload').addEventListener('click',()=>{
  document.getElementById('btnGenerate').click();
});

render();
